name: Golden Hour Daily Forecast

on:
  schedule:
    # Snapshot at 05:00 UTC every morning (6am Slovenia time)
    - cron: '0 5 * * *'
    # Fetch actuals at 06:00 UTC (catches yesterday's verified data)
    - cron: '0 6 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'snapshot'
        type: choice
        options:
          - snapshot
          - actuals
          - both

jobs:
  snapshot:
    name: Save Forecast Snapshot
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.job == 'snapshot' || github.event.inputs.job == 'both') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 5 * * *')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/snapshot.py

  fetch-actuals:
    name: Fetch Actual Weather
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.job == 'actuals' || github.event.inputs.job == 'both') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * *')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch actuals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/fetch_actuals.py
